<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;font-family:var(--font-sans);background:var(--bg-page);color:var(--fg-strong);}
  .row{display:flex;align-items:center;gap:14px;margin-bottom:8px;}
  .row .lbl{width:60px;font-family:var(--font-mono);font-size:11px;color:var(--fg-caption);}
  .bar{height:18px;background:var(--color-gray-800);border-radius:4px;}
  .v{font-family:var(--font-mono);font-size:11px;color:var(--fg-caption);}
</style></head>
<body>
  <div class="row"><div class="lbl">space-1</div><div class="bar" style="width:4px"></div><div class="v">4px</div></div>
  <div class="row"><div class="lbl">space-2</div><div class="bar" style="width:8px"></div><div class="v">8px</div></div>
  <div class="row"><div class="lbl">space-3</div><div class="bar" style="width:12px"></div><div class="v">12px · list gap</div></div>
  <div class="row"><div class="lbl">space-4</div><div class="bar" style="width:16px"></div><div class="v">16px · card padding</div></div>
  <div class="row"><div class="lbl">space-6</div><div class="bar" style="width:24px"></div><div class="v">24px · screen gutter</div></div>
  <div class="row"><div class="lbl">space-8</div><div class="bar" style="width:32px"></div><div class="v">32px</div></div>
  <div class="row"><div class="lbl">space-12</div><div class="bar" style="width:48px"></div><div class="v">48px · auth top space</div></div>
</body></html>
