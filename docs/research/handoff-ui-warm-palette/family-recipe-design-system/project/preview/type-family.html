<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;font-family:var(--font-sans);background:var(--bg-page);color:var(--fg-strong);}
  .label{font-size:11px;color:var(--fg-meta);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
  .specimen{font-family:var(--font-display);font-size:60px;line-height:1;letter-spacing:-0.015em;font-variation-settings:"SOFT" 50,"WONK" 0,"opsz" 60;}
  .row{display:flex;gap:32px;margin-top:14px;align-items:baseline;}
  .alphabet{font-family:var(--font-display);font-size:18px;color:var(--fg-body);font-variation-settings:"SOFT" 50,"WONK" 0,"opsz" 18;}
  .alphabet em{font-style:italic;color:var(--fg-strong);}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--fg-caption);}
</style></head>
<body>
  <div class="label">Display — Fraunces · variable (opsz · wght · SOFT · WONK)</div>
  <div class="specimen">Made for the <em>family</em>.</div>
  <div class="row">
    <div class="alphabet">ABCDEFGHIJ abcdefghij <em>italic</em></div>
    <div class="meta">0123456789 · weight 400–700 · opsz 9–144</div>
  </div>
</body></html>
