<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;font-family:var(--font-sans);background:var(--bg-page);}
  .row{display:grid;grid-template-columns:repeat(11,1fr);gap:10px;}
  .sw{aspect-ratio:1/1;border-radius:10px;border:1px solid var(--border-card);display:flex;flex-direction:column;justify-content:flex-end;padding:8px;}
  .sw .name{font-size:11px;font-weight:500;color:var(--fg-strong);}
  .sw .val{font-size:10px;color:var(--fg-meta);font-family:var(--font-mono);}
  .sw.dark .name,.sw.dark .val{color:#fff;}
  .sw.dark .val{color:rgba(255,255,255,.7);}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:#fff"><div class="name">white</div><div class="val">#fff</div></div>
    <div class="sw" style="background:var(--color-gray-50)"><div class="name">50</div><div class="val">page</div></div>
    <div class="sw" style="background:var(--color-gray-100)"><div class="name">100</div><div class="val">muted</div></div>
    <div class="sw" style="background:var(--color-gray-200)"><div class="name">200</div><div class="val">border</div></div>
    <div class="sw" style="background:var(--color-gray-300)"><div class="name">300</div><div class="val">input</div></div>
    <div class="sw dark" style="background:var(--color-gray-400)"><div class="name">400</div><div class="val">placeholder</div></div>
    <div class="sw dark" style="background:var(--color-gray-500)"><div class="name">500</div><div class="val">caption</div></div>
    <div class="sw dark" style="background:var(--color-gray-600)"><div class="name">600</div><div class="val">meta</div></div>
    <div class="sw dark" style="background:var(--color-gray-700)"><div class="name">700</div><div class="val">body</div></div>
    <div class="sw dark" style="background:var(--color-gray-800)"><div class="name">800</div><div class="val">primary</div></div>
    <div class="sw dark" style="background:var(--color-gray-900)"><div class="name">900</div><div class="val">strong</div></div>
  </div>
</body></html>
