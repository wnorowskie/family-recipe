<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;font-family:var(--font-sans);background:var(--bg-page);color:var(--fg-strong);display:flex;justify-content:center;}
  .frame{width:375px;background:#fff;border:1px solid var(--border-card);border-radius:14px;overflow:hidden;}
  .bar{display:flex;justify-content:space-around;align-items:center;padding:8px 12px;border-top:1px solid var(--color-gray-300);}
  button{background:transparent;border:0;display:flex;flex-direction:column;align-items:center;gap:4px;padding:4px 14px;font-family:inherit;color:var(--color-gray-400);font-size:12px;}
  button.active{color:var(--fg-strong);}
  .ico{font-size:22px;}
  .fab{background:var(--bg-primary);color:#fff;width:40px;height:40px;border-radius:9999px;display:flex;align-items:center;justify-content:center;font-size:24px;}
  .lbl{font-size:11px;color:var(--fg-meta);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;}
</style></head>
<body>
  <div>
    <div class="lbl">Bottom tab bar · Timeline active</div>
    <div class="frame">
      <div class="bar">
        <button class="active"><span class="ico">⌂</span><span>Timeline</span></button>
        <button><span class="ico">📖</span><span>Recipes</span></button>
        <button><span class="fab">+</span></button>
        <button><span class="ico">👤</span><span>Profile</span></button>
      </div>
    </div>
  </div>
</body></html>
