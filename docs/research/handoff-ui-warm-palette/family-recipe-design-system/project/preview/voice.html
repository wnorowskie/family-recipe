<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;font-family:var(--font-sans);background:var(--bg-page);color:var(--fg-strong);}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .card{background:#fff;border:1px solid var(--border-card);border-radius:14px;padding:14px;}
  .lbl{font-size:11px;color:var(--fg-meta);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;font-weight:500;}
  .ex{font-size:14px;color:var(--fg-body);line-height:1.5;}
  .strong{color:var(--fg-strong);}
  .yes{color:#15803d;}.no{color:var(--color-red-600);}
</style></head>
<body>
  <div class="grid">
    <div class="card"><div class="lbl">Activity sentence</div><div class="ex"><span class="strong">Mom</span> posted <span class="strong">'Lemon Chicken'</span></div></div>
    <div class="card"><div class="lbl">Authorship</div><div class="ex">by <span class="strong">Mom</span> · 2 hours ago</div></div>
    <div class="card"><div class="lbl">Stat readout</div><div class="ex">Cooked 3 times · 4.3⭐</div></div>
    <div class="card"><div class="lbl">Empty placeholder</div><div class="ex" style="color:var(--fg-placeholder);">Share the story behind this dish…</div></div>
    <div class="card"><div class="lbl">Yes ✓</div><div class="ex yes">"This was amazing! The lemon flavor was perfect."</div></div>
    <div class="card"><div class="lbl">No ✗</div><div class="ex no">"Discover delicious recipes from your loved ones!"</div></div>
  </div>
</body></html>
