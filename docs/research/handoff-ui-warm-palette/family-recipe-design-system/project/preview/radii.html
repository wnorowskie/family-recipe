<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;font-family:var(--font-sans);background:var(--bg-page);color:var(--fg-strong);}
  .row{display:flex;gap:16px;align-items:flex-end;}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .box{width:72px;height:72px;background:var(--bg-surface);border:1px solid var(--border-card);}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-caption);text-align:center;line-height:1.4;}
  .lbl strong{display:block;color:var(--fg-strong);font-weight:500;}
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="lbl"><strong>4px</strong>chip</div></div>
    <div class="item"><div class="box" style="border-radius:10px"></div><div class="lbl"><strong>10px</strong>input · btn</div></div>
    <div class="item"><div class="box" style="border-radius:14px"></div><div class="lbl"><strong>14px</strong>card ★</div></div>
    <div class="item"><div class="box" style="border-radius:16px"></div><div class="lbl"><strong>16px</strong>logo sq</div></div>
    <div class="item"><div class="box" style="border-radius:9999px"></div><div class="lbl"><strong>pill</strong>tag · FAB</div></div>
    <div class="item"><div class="box" style="border-radius:40px;width:90px;height:90px"></div><div class="lbl"><strong>40px</strong>device frame</div></div>
  </div>
</body></html>
