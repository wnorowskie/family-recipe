<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;font-family:var(--font-sans);background:var(--bg-page);color:var(--fg-strong);}
  .row{display:flex;gap:12px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
  .lbl{width:90px;font-size:11px;color:var(--fg-meta);text-transform:uppercase;letter-spacing:.05em;}
  .btn-primary{background:var(--bg-primary);color:#fff;border:0;border-radius:10px;padding:12px 16px;font-weight:500;font-family:inherit;font-size:14px;}
  .btn-secondary{background:#fff;color:var(--fg-strong);border:1px solid var(--border-input);border-radius:10px;padding:12px 16px;font-weight:500;font-family:inherit;font-size:14px;}
  .btn-text{background:transparent;color:var(--fg-strong);border:0;font-weight:500;font-size:14px;text-decoration:underline;}
  .btn-danger{background:#fff;color:var(--color-red-600);border:1px solid var(--border-input);border-radius:10px;padding:12px 16px;font-weight:500;font-family:inherit;font-size:14px;display:inline-flex;align-items:center;gap:8px;}
  .fab{background:var(--bg-primary);color:#fff;border:0;width:40px;height:40px;border-radius:9999px;display:inline-flex;align-items:center;justify-content:center;font-size:20px;}
</style></head>
<body>
  <div class="row"><div class="lbl">Primary</div><button class="btn-primary">Log In</button><button class="btn-primary">Cooked this</button><button class="btn-primary">Save</button></div>
  <div class="row"><div class="lbl">Secondary</div><button class="btn-secondary">Edit</button><button class="btn-secondary">Cancel</button></div>
  <div class="row"><div class="lbl">Text link</div><button class="btn-text">Forgot password?</button><button class="btn-text">Create account</button></div>
  <div class="row"><div class="lbl">Destructive</div><button class="btn-danger">↪ Log Out</button></div>
  <div class="row"><div class="lbl">FAB</div><button class="fab">+</button></div>
</body></html>
