<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;font-family:var(--font-sans);background:var(--bg-page);color:var(--fg-strong);display:flex;align-items:center;gap:32px;}
  .mark{width:96px;height:96px;background:var(--color-gray-300);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:48px;flex-shrink:0;}
  .info h2{margin:0 0 6px 0;font-size:24px;font-weight:500;}
  .info p{margin:0;color:var(--fg-meta);font-size:13px;max-width:380px;line-height:1.55;}
  .flag{margin-top:10px;font-size:12px;color:var(--fg-meta);background:var(--bg-muted);padding:8px 12px;border-radius:8px;display:inline-block;}
</style></head>
<body>
  <div class="mark">🍳</div>
  <div class="info">
    <h2>Family Recipe</h2>
    <p>Logo is currently a 64–96px gray-300 rounded-2xl square with a 🍳 emoji glyph. Used on the auth screens above the wordmark.</p>
    <div class="flag">⚑ Placeholder. No real wordmark or mark in the repo. Send one and we'll redo the auth cards.</div>
  </div>
</body></html>
