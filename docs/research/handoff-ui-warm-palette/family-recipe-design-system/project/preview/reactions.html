<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;font-family:var(--font-sans);background:var(--bg-page);color:var(--fg-strong);}
  .lbl{font-size:11px;color:var(--fg-meta);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;font-weight:500;}
  .row{display:flex;gap:18px;align-items:center;}
  .reaction{display:flex;align-items:center;gap:4px;font-size:14px;color:var(--fg-meta);}
  .reaction .em{font-size:18px;}
  .stars{font-size:18px;letter-spacing:1px;}
  .note{margin-top:18px;background:var(--bg-muted);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--fg-meta);}
</style></head>
<body>
  <div class="lbl">Reactions · "Cooked this" rating · the only place emoji appears in chrome-adjacent UI</div>
  <div class="row">
    <div class="reaction"><span class="em">❤️</span><span>5</span></div>
    <div class="reaction"><span class="em">😋</span><span>3</span></div>
    <div class="reaction"><span class="em">👍</span><span>2</span></div>
    <div style="flex:1"></div>
    <div class="stars">⭐⭐⭐⭐</div>
    <div class="reaction"><span>(4 stars)</span></div>
  </div>
  <div class="note">Emoji is reserved for user-generated reactions and ratings. Navigation, status, and section icons use Lucide line icons.</div>
</body></html>
