<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;font-family:var(--font-sans);background:var(--bg-page);color:var(--fg-strong);}
  .row{display:flex;gap:18px;align-items:flex-end;}
  .item{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .av{background:var(--color-gray-300);border-radius:9999px;}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-caption);}
  .name{font-size:13px;}
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="av" style="width:32px;height:32px;"></div><div class="name">Eric</div><div class="lbl">32 · comment</div></div>
    <div class="item"><div class="av" style="width:40px;height:40px;"></div><div class="name">Mom</div><div class="lbl">40 · author</div></div>
    <div class="item"><div class="av" style="width:48px;height:48px;"></div><div class="name">Dad</div><div class="lbl">48 · members list</div></div>
    <div class="item"><div class="av" style="width:80px;height:80px;"></div><div class="name">Sarah</div><div class="lbl">80 · profile</div></div>
  </div>
</body></html>
