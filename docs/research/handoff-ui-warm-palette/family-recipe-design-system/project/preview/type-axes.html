<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;font-family:var(--font-sans);background:var(--bg-page);color:var(--fg-strong);}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .cell{background:#fff;border:1px solid var(--border-card);border-radius:14px;padding:14px 16px;}
  .cell .axis{font-family:var(--font-mono);font-size:10px;color:var(--fg-caption);letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px;}
  .cell .word{font-family:var(--font-display);font-size:38px;line-height:1;color:var(--fg-strong);}
</style></head>
<body>
  <div class="grid">
    <div class="cell"><div class="axis">opsz 14 · soft 0</div><div class="word" style="font-size:22px;font-variation-settings:'opsz' 14,'SOFT' 0,'WONK' 0;">Crisp small caption</div></div>
    <div class="cell"><div class="axis">opsz 60 · soft 50</div><div class="word" style="font-variation-settings:'opsz' 60,'SOFT' 50,'WONK' 0;">Soft Title</div></div>
    <div class="cell"><div class="axis">wonk 1 · soft 100</div><div class="word" style="font-variation-settings:'opsz' 60,'SOFT' 100,'WONK' 1;">Wonky g</div></div>
    <div class="cell"><div class="axis">italic 700</div><div class="word" style="font-style:italic;font-weight:700;font-variation-settings:'opsz' 60,'SOFT' 50,'WONK' 0;">Recipe</div></div>
  </div>
</body></html>
