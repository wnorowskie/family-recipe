<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;font-family:var(--font-sans);background:var(--bg-page);color:var(--fg-strong);}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  label{display:block;font-size:14px;color:var(--fg-body);margin-bottom:4px;font-weight:400;}
  .input{width:100%;padding:12px 14px;border:1px solid var(--border-input);border-radius:10px;background:#fff;font-family:inherit;font-size:14px;box-sizing:border-box;}
  .input.invalid{border:2px solid var(--border-error);}
  .req{color:var(--color-red-500);}
  .err{display:flex;gap:4px;align-items:center;font-size:12px;color:var(--color-red-600);margin-top:4px;}
  .help{font-size:12px;color:var(--fg-caption);margin-top:4px;}
  .search{position:relative;}
  .search .icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--fg-placeholder);}
  .search .input{padding-left:36px;}
</style></head>
<body>
  <div class="grid">
    <div>
      <label>Email or Username</label>
      <input class="input" placeholder="email@example.com" />
    </div>
    <div>
      <label>Title <span class="req">*</span></label>
      <input class="input" placeholder="Recipe or post title" />
    </div>
    <div>
      <label>Family Master Key</label>
      <input class="input invalid" placeholder="Enter family code" />
      <div class="err">⚠ Invalid family key</div>
    </div>
    <div>
      <label>Search</label>
      <div class="search">
        <span class="icon">🔍</span>
        <input class="input" placeholder="Search by title, author, or ingredient…" />
      </div>
      <div class="help">Filter by tag, course, or sort by newest.</div>
    </div>
  </div>
</body></html>
